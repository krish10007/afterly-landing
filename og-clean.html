<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; background: #0D0B18; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C6CFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0D0B18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="25%">
      <stop offset="0%" stop-color="#9a87ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D0B18" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0B18"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Centered wordmark -->
  <text x="600" y="290" text-anchor="middle" font-family="'Inter Tight', system-ui, sans-serif" font-weight="800" font-size="120" letter-spacing="-4">
    <tspan fill="#E6E1FF">after</tspan><tspan fill="#7C6CFF">ly</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle" font-family="'Inter Tight', system-ui, sans-serif" font-weight="400" font-size="28" fill="#A8A3C7" letter-spacing="-0.5">no contact. day by day.</text>

  <!-- URL bottom -->
  <text x="600" y="560" text-anchor="middle" font-family="'Inter Tight', system-ui, sans-serif" font-weight="400" font-size="18" fill="#A8A3C7" opacity="0.4">useafterly.com</text>

</svg>
</body>
</html>
