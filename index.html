<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

<script type="text/babel" data-presets="react">
// Afterly — landing page (single-file, CDN React + Babel standalone)
// Type system: DM Sans for UI, Playfair Display for display headings.

const PAL = {
  bg: '#0D0B18',
  bgSoft: '#14111F',
  accent: '#7C6CFF',
  accentSoft: 'rgba(124,108,255,0.85)',
  white: '#FFFFFF',
  lavender: '#E6E1FF',
  muted: '#A8A3C7',
  mutedSoft: 'rgba(168,163,199,0.6)',
  cardFill: 'rgba(124,108,255,0.04)',
  cardBorder: 'rgba(230,225,255,0.08)',
  cardBorderHi: 'rgba(124,108,255,0.18)',
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "glowIntensity": 0.55,
  "viewport": "desktop"
}/*EDITMODE-END*/;

const FONT = '"Inter Tight", system-ui, -apple-system, sans-serif';
const FONT_DISPLAY = '"Inter Tight", system-ui, -apple-system, sans-serif';

// ─────────────────────────────────────────────────────────────
// Logo
// ─────────────────────────────────────────────────────────────
function AfterlyIcon({ size = 64, radiusRatio = 0.225 }) {
  const k = size / 1024;
  const r = Math.round(size * radiusRatio);
  return (
    <div style={{
      width: size, height: size, background: PAL.bg,
      borderRadius: r, overflow: 'hidden', position: 'relative',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: '0 10px 40px rgba(124,108,255,0.18), inset 0 0 0 1px rgba(230,225,255,0.06)',
      flexShrink: 0,
    }}>
      <div style={{
        width: 1024, height: 1024,
        transform: `scale(${k})`,
        transformOrigin: 'center',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        flexShrink: 0,
      }}>
        <div style={{
          fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 260, letterSpacing: -14,
          lineHeight: 1, whiteSpace: 'nowrap',
        }}>
          <span style={{ color: PAL.lavender }}>after</span>
          <span style={{ color: PAL.accent }}>ly</span>
        </div>
      </div>
    </div>
  );
}

function AfterlyWordmark({ size = 18 }) {
  return (
    <div style={{
      fontFamily: FONT_DISPLAY, fontWeight: 700,
      fontSize: size, letterSpacing: -0.5, lineHeight: 1,
      whiteSpace: 'nowrap',
    }}>
      <span style={{ color: PAL.lavender }}>after</span>
      <span style={{ color: PAL.accent }}>ly</span>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Glyphs
// ─────────────────────────────────────────────────────────────
const Glyph = {
  Moon: ({ size = 22, color = PAL.lavender }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z" />
    </svg>
  ),
  Loop: ({ size = 22, color = PAL.lavender }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M4 12a8 8 0 0 1 14-5.3" />
      <path d="M20 12a8 8 0 0 1-14 5.3" />
      <path d="M18 3v4h-4" />
      <path d="M6 21v-4h4" />
    </svg>
  ),
  Streak: ({ size = 22, color = PAL.lavender }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M4 18l4-6 4 3 5-9 3 6" />
      <circle cx="20" cy="12" r="1" fill={color} stroke="none" />
    </svg>
  ),
  AppStore: ({ size = 18, color = '#fff' }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={color}>
      <path d="M17.05 12.5c-.03-2.85 2.33-4.22 2.43-4.29-1.32-1.94-3.39-2.21-4.12-2.24-1.76-.18-3.43 1.03-4.32 1.03-.9 0-2.27-1-3.73-.97-1.92.03-3.69 1.12-4.68 2.83-2 3.46-.51 8.59 1.43 11.4.95 1.37 2.09 2.91 3.59 2.86 1.44-.06 1.99-.93 3.73-.93s2.23.93 3.76.9c1.55-.03 2.53-1.4 3.48-2.78 1.1-1.6 1.55-3.15 1.57-3.23-.04-.02-3.01-1.16-3.04-4.58zM14.27 4.16c.79-.96 1.32-2.29 1.18-3.62-1.13.05-2.5.76-3.32 1.71-.73.84-1.37 2.19-1.2 3.5 1.27.1 2.55-.64 3.34-1.59z"/>
    </svg>
  ),
};

function Glow({ x = '50%', y = '50%', size = 800, intensity = 0.55, hue = PAL.accent }) {
  return (
    <div style={{
      position: 'absolute', left: x, top: y, transform: 'translate(-50%, -50%)',
      width: size, height: size, borderRadius: '50%',
      background: `radial-gradient(circle, ${hue} 0%, transparent 60%)`,
      opacity: intensity,
      filter: 'blur(40px)',
      pointerEvents: 'none',
      zIndex: 0,
    }} />
  );
}

function Grain() {
  return (
    <div style={{
      position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 1,
      opacity: 0.04, mixBlendMode: 'overlay',
      backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")`,
    }} />
  );
}

function CTAButton({ children, primary = true, small = false }) {
  return (
    <button style={{
      display: 'inline-flex', alignItems: 'center', gap: 10,
      padding: small ? '10px 22px' : '15px 28px',
      borderRadius: 999,
      background: primary ? 'rgba(139,92,246,0.85)' : 'transparent',
      border: primary ? 'none' : `1px solid ${PAL.cardBorder}`,
      color: PAL.white,
      fontFamily: FONT,
      fontSize: small ? 13 : 15, fontWeight: 600,
      letterSpacing: -0.2,
      cursor: 'pointer',
      boxShadow: primary ? '0 8px 28px rgba(124,108,255,0.35), inset 0 1px 0 rgba(255,255,255,0.18)' : 'none',
      transition: 'transform 200ms, box-shadow 200ms, background 200ms',
    }}
    onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-1px)'; }}
    onMouseLeave={e => { e.currentTarget.style.transform = 'translateY(0)'; }}>
      {children}
    </button>
  );
}

function AppStoreButton() {
  return (
    <a href="#" style={{ textDecoration: 'none' }}>
      <CTAButton>
        <Glyph.AppStore />
        Download on the App Store
      </CTAButton>
    </a>
  );
}

function Card({ children, padding = 32, style = {} }) {
  return (
    <div style={{
      background: PAL.cardFill,
      border: `1px solid ${PAL.cardBorder}`,
      borderRadius: 18,
      padding,
      backdropFilter: 'blur(20px)',
      WebkitBackdropFilter: 'blur(20px)',
      position: 'relative',
      ...style,
    }}>
      {children}
    </div>
  );
}

// Heading helper — single source of truth for type hierarchy
function Heading({ children, size, color = PAL.white, as: Tag = 'h2', style = {} }) {
  return (
    <Tag style={{
      fontFamily: FONT_DISPLAY,
      fontWeight: 700,
      fontSize: size,
      letterSpacing: '-0.035em',
      lineHeight: 1.08,
      color,
      margin: 0,
      textWrap: 'balance',
      ...style,
    }}>
      {children}
    </Tag>
  );
}

// ─────────────────────────────────────────────────────────────
// Sections
// ─────────────────────────────────────────────────────────────
function Nav({ mobile }) {
  return (
    <nav style={{
      position: 'relative', zIndex: 10,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: mobile ? '20px 24px' : '24px 56px',
      maxWidth: 1240, margin: '0 auto', width: '100%',
    }}>
      <AfterlyWordmark size={mobile ? 16 : 17} />
      {!mobile && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
          {['How it works', 'Story', 'Privacy'].map(l => (
            <a key={l} href="#" style={{
              color: PAL.muted, fontFamily: FONT,
              fontSize: 14, textDecoration: 'none', letterSpacing: -0.1,
            }}>{l}</a>
          ))}
        </div>
      )}
      <div style={{ opacity: mobile ? 0 : 1, pointerEvents: mobile ? 'none' : 'auto' }}>
        <CTAButton small>Download</CTAButton>
      </div>
    </nav>
  );
}

function Hero({ t, mobile }) {
  return (
    <section style={{ position: 'relative', overflow: 'hidden' }}>
      <Glow x="60%" y="40%" size={mobile ? 600 : 1100} intensity={t.glowIntensity * 0.6} />
      <Glow x="20%" y="80%" size={mobile ? 400 : 700} intensity={t.glowIntensity * 0.3} hue="#5e4ed9" />
      <div style={{
        position: 'relative', zIndex: 2,
        maxWidth: 1240, margin: '0 auto',
        padding: mobile ? '40px 24px 80px' : '80px 56px 120px',
        display: 'flex', flexDirection: 'column',
        alignItems: mobile ? 'center' : 'flex-start',
        textAlign: mobile ? 'center' : 'left',
      }}>
        <div style={{ marginBottom: mobile ? 28 : 40 }}>
          <AfterlyIcon size={mobile ? 64 : 76} />
        </div>
        <Heading
          as="h1"
          size={mobile ? 42 : 76}
          color={PAL.white}
          style={{ maxWidth: 880, letterSpacing: '-0.04em', lineHeight: 1.04 }}
        >
          You know you shouldn't.{' '}
          <span style={{ color: PAL.muted }}>You do it anyway.</span>
        </Heading>
        <p style={{
          fontFamily: FONT,
          fontSize: mobile ? 16 : 19, fontWeight: 400,
          color: PAL.muted, lineHeight: 1.55, letterSpacing: -0.15,
          maxWidth: 480, textWrap: 'pretty',
          margin: mobile ? '24px auto 0' : '28px 0 0',
        }}>
          afterly helps you hold the line — one day at a time.
        </p>
        <div style={{
          marginTop: mobile ? 32 : 40,
          display: 'flex', gap: 14, flexWrap: 'wrap',
          justifyContent: mobile ? 'center' : 'flex-start', alignItems: 'center',
        }}>
          <AppStoreButton />
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            color: PAL.mutedSoft, fontFamily: FONT, fontSize: 13,
          }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: PAL.accent }} />
            Free to try · iPhone
          </div>
        </div>
      </div>
    </section>
  );
}

function ProblemSection({ t, mobile }) {
  const lines = [
    "You've opened their profile six times today.",
    "You drafted a text you didn't send.",
    "You told yourself tomorrow will be different.",
  ];
  return (
    <section style={{ position: 'relative', overflow: 'hidden' }}>
      <Glow x="50%" y="50%" size={mobile ? 500 : 900} intensity={t.glowIntensity * 0.25} hue="#3a2d6e" />
      <div style={{
        position: 'relative', zIndex: 2,
        maxWidth: 880, margin: '0 auto',
        padding: mobile ? '60px 24px' : '100px 56px',
        textAlign: 'center',
      }}>
        <Heading size={mobile ? 32 : 56} color={PAL.white} style={{ letterSpacing: '-0.035em' }}>
          It's 2am.{' '}
          <span style={{ color: PAL.muted }}>Their name is right there.</span>
        </Heading>

        <div style={{
          marginTop: mobile ? 44 : 64,
          display: 'flex', flexDirection: 'column', gap: mobile ? 16 : 18,
        }}>
          {lines.map((l, i) => (
            <div key={i} style={{
              fontFamily: FONT, fontWeight: 400,
              fontSize: mobile ? 17 : 19, lineHeight: 1.5,
              color: PAL.lavender, opacity: 0.7,
              letterSpacing: -0.2,
            }}>
              {l}
            </div>
          ))}
        </div>

        <div style={{
          marginTop: mobile ? 48 : 72,
          paddingTop: mobile ? 32 : 40,
          borderTop: `1px solid ${PAL.cardBorder}`,
          fontFamily: FONT_DISPLAY, fontWeight: 700, fontStyle: 'italic',
          fontSize: mobile ? 22 : 30,
          color: PAL.white, letterSpacing: -0.6,
          textWrap: 'balance', lineHeight: 1.3,
        }}>
          That's not weakness. <span style={{ color: PAL.accent }}>That's withdrawal.</span>
        </div>
      </div>

}

function FeaturesSection({ t, mobile }) {
  const features = [
    {
      glyph: <Glyph.Moon size={26} />,
      title: 'Crisis support at 2am',
      body: 'When the urge hits, open afterly instead. Sixty seconds is all it takes.',
    },
    {
      glyph: <Glyph.Loop size={26} />,
      title: 'Break the thought loop',
      body: 'Guided tools to quiet the spiral before it takes over the night.',
    },
    {
      glyph: <Glyph.Streak size={26} />,
      title: 'Track your streak',
      body: 'Watch the days stack up. Watch the urges fade. No shame in starting over.',
    },
  ];
  return (
    <section style={{ position: 'relative', overflow: 'hidden' }}>
      <Glow x="80%" y="40%" size={mobile ? 500 : 900} intensity={t.glowIntensity * 0.35} />
      <div style={{
        position: 'relative', zIndex: 2,
        maxWidth: 1240, margin: '0 auto',
        padding: mobile ? '60px 24px' : '100px 56px',
      }}>
        <div style={{ maxWidth: 720, marginBottom: mobile ? 40 : 64 }}>
          <Heading size={mobile ? 32 : 56} color={PAL.white}>
            This is what{' '}
            <span style={{ color: PAL.muted }}>you open instead.</span>
          </Heading>
        </div>

        <div style={{
          display: 'grid',
          gridTemplateColumns: mobile ? '1fr' : 'repeat(3, 1fr)',

        }}>
          {features.map((f, i) => (
            <Card key={i} padding={mobile ? 24 : 32}>
              <div style={{
                width: 46, height: 46, borderRadius: 12,

                display: 'flex', alignItems: 'center', justifyContent: 'center',
                marginBottom: 24,
              }}>
                {f.glyph}
              </div>
              <Heading as="h3" size={mobile ? 19 : 21} color={PAL.white}
                style={{ letterSpacing: '-0.025em', lineHeight: 1.25 }}>
                {f.title}
              </Heading>
              <p style={{
                marginTop: 12, marginBottom: 0,
                fontFamily: FONT, fontSize: 14, fontWeight: 400,
                color: PAL.muted, lineHeight: 1.55, letterSpacing: -0.1,
              }}>
                {f.body}
              </p>

}

function FinalCTA({ t, mobile }) {
  return (
    <section style={{ position: 'relative', overflow: 'hidden' }}>
      <Glow x="50%" y="60%" size={mobile ? 700 : 1300} intensity={t.glowIntensity * 0.6} />
      <Glow x="50%" y="60%" size={mobile ? 350 : 600} intensity={t.glowIntensity * 0.35} hue="#9a87ff" />
      <div style={{
        position: 'relative', zIndex: 2,
        maxWidth: 880, margin: '0 auto',
        padding: mobile ? '80px 24px 60px' : '140px 56px 110px',
        textAlign: 'center',
      }}>
        <Heading size={mobile ? 42 : 76} color={PAL.white}
          style={{ letterSpacing: '-0.04em', lineHeight: 1.04 }}>
          Your recovery starts tonight.{' '}
          <span style={{ color: PAL.accent }}>Not tomorrow.</span>
        </Heading>
        <div style={{
          marginTop: mobile ? 36 : 48,
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14,
        }}>
          <AppStoreButton />
          <div style={{
            fontFamily: FONT, fontSize: 12, color: PAL.mutedSoft,
            letterSpacing: 0.2,
          }}>
            Free to try. Cancel anytime.
          </div>
        </div>
      </div>
    </section>

}

function Footer({ mobile }) {
  const links = [
    { label: 'Privacy', href: '/privacy' },
    { label: 'Support', href: '/support' },
  ];
  return (
    <footer style={{ position: 'relative', borderTop: `1px solid ${PAL.cardBorder}` }}>
      <div style={{
        maxWidth: 1240, margin: '0 auto',
        padding: mobile ? '28px 24px' : '32px 56px',
        display: 'flex', flexDirection: mobile ? 'column' : 'row',

        justifyContent: 'space-between', gap: mobile ? 16 : 0,
      }}>
        <AfterlyWordmark size={15} />
        <div style={{ display: 'flex', gap: 24 }}>
          {links.map(l => (
            <a key={l.label} href={l.href} style={{
              color: PAL.muted, fontFamily: FONT,
              fontSize: 13, textDecoration: 'none',
            }}>{l.label}</a>
          ))}
        </div>
        <div style={{
          fontFamily: FONT, fontSize: 12, color: PAL.mutedSoft,
        }}>
          © 2026 afterly
        </div>
      </div>

// ─────────────────────────────────────────────────────────────
// Tweaks + viewport toggle
// ─────────────────────────────────────────────────────────────
function TweaksPanel({ t, setT, visible }) {
  if (!visible) return null;
  const update = (k, v) => {
    const next = { ...t, [k]: v };
    setT(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };
  const inpStyle = {
    width: '100%', background: '#1A1628', border: '1px solid rgba(255,255,255,0.08)',
    color: '#E6E1FF', padding: '6px 8px', borderRadius: 6,
    fontFamily: 'inherit', fontSize: 12,
  };
  const row = (label, ctrl) => (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 12 }}>
      <div style={{ width: 80, color: '#A8A3C7' }}>{label}</div>
      <div style={{ flex: 1 }}>{ctrl}</div>
    </div>
  );
  return (
    <div style={{
      position: 'fixed', right: 20, bottom: 20, width: 260,
      background: 'rgba(13,11,24,0.96)', backdropFilter: 'blur(20px)',
      border: '1px solid rgba(255,255,255,0.08)',
      borderRadius: 14, padding: 16, zIndex: 1000,
      boxShadow: '0 20px 60px rgba(0,0,0,0.5)',
      fontFamily: FONT, color: '#E6E1FF',
      display: 'flex', flexDirection: 'column', gap: 10,
    }}>
      <div style={{
        fontSize: 11, letterSpacing: 2, textTransform: 'uppercase',
        color: '#7C6CFF', fontWeight: 600, marginBottom: 4,
      }}>Tweaks</div>
      {row('Viewport', (
        <select style={inpStyle} value={t.viewport} onChange={e => update('viewport', e.target.value)}>
          <option value="desktop">Desktop</option>
          <option value="mobile">Mobile</option>
        </select>
      ))}
      {row('Glow', (
        <input type="range" min={0} max={1} step={0.05} value={t.glowIntensity}
          onChange={e => update('glowIntensity', +e.target.value)} style={{ width: '100%' }} />
      ))}
    </div>
  );
}

function ViewportToggle({ t, setT }) {
  const set = (v) => {
    const next = { ...t, viewport: v };
    setT(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { viewport: v } }, '*');
  };
  const btn = (label, val) => (
    <button onClick={() => set(val)} style={{
      padding: '8px 14px', border: 'none', cursor: 'pointer',
      background: t.viewport === val ? PAL.accent : 'transparent',
      color: t.viewport === val ? '#fff' : PAL.muted,
      fontFamily: FONT, fontSize: 12, fontWeight: 600,
      borderRadius: 999, transition: 'all 200ms',
    }}>{label}</button>
  );
  return (
    <div style={{
      position: 'fixed', bottom: 20, left: 20, zIndex: 999,
      background: 'rgba(13,11,24,0.85)', backdropFilter: 'blur(20px)',
      border: '1px solid rgba(255,255,255,0.08)',
      borderRadius: 999, padding: 4,
      display: 'flex', gap: 2,
      boxShadow: '0 8px 24px rgba(0,0,0,0.4)',
    }}>
      {btn('Desktop', 'desktop')}
      {btn('Mobile', 'mobile')}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
function App() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const mobile = t.viewport === 'mobile';
  const pageWidth = mobile ? 390 : '100%';

  return (
    <div style={{
      minHeight: '100vh', background: PAL.bg,
      display: 'flex', justifyContent: 'center',
      padding: mobile ? '40px 20px' : 0,
    }}>
      <Grain />
      <ViewportToggle t={t} setT={setT} />
      <div style={{
        width: pageWidth, maxWidth: '100%',
        background: PAL.bg, position: 'relative', overflow: 'hidden',
        borderRadius: mobile ? 32 : 0,
        boxShadow: mobile ? '0 30px 80px rgba(0,0,0,0.6), inset 0 0 0 8px #1a1328' : 'none',
      }}>
        <Nav mobile={mobile} />
        <Hero t={t} mobile={mobile} />
        <ProblemSection t={t} mobile={mobile} />
        <FeaturesSection t={t} mobile={mobile} />
        <FinalCTA t={t} mobile={mobile} />
        <Footer mobile={mobile} />
      </div>
      <TweaksPanel t={t} setT={setT} visible={tweaksVisible} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
